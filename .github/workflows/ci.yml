name: SRE CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
- name: Checkout code
  uses: actions/checkout@v4steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print date
        run: date

      - name: List files
        run: ls -la

      - name: Check Python version
        run: python3 --version
